<nav class="navbar">
  <div class="navbar__brand">
    <span class="navbar__logo">🧵</span>
    <span class="navbar__name">UrbanThreads</span>
  </div>

  <ul class="navbar__links" *ngIf="session.isLoggedIn()">
    <li>
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
    </li>
    <li>
      <a routerLink="/product" routerLinkActive="active">Shop</a>
    </li>
    <li>
      <a routerLink="/checkout" routerLinkActive="active">Checkout</a>
    </li>
  </ul>

  <div class="navbar__user" *ngIf="session.isLoggedIn()">
    <span class="navbar__avatar">{{
      session.user()?.displayName?.charAt(0)
    }}</span>
    <span class="navbar__username">{{ session.user()?.displayName }}</span>
  </div>
</nav>

<main class="app-content">
  <router-outlet />
</main>
